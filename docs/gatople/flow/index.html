<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gátople — kinetic scale wheel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">Sistema Fractal · Flow Lab</span>
      <h1>El Gátople</h1>
    </div>
    <a class="classic-link" href="../">Classic</a>
    <div class="tonic-readout" aria-live="polite">
      <span>Tonic</span>
      <strong id="tonic-label">A</strong>
      <em id="tonic-mode">Eólico</em>
    </div>
  </header>

  <main class="app-grid">
    <section class="wheel-panel" aria-label="Gátople kinetic wheel">
      <svg id="wheel" viewBox="-270 -270 540 540" aria-label="Gátople wheel">
        <defs>
          <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#111" flood-opacity="0.18"/>
          </filter>
          <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <circle class="field-disc" r="262"/>
        <g id="orbit-disc">
          <g id="outer-disc"></g>
          <g id="symbol-trails"></g>
        </g>
        <g id="inner-disc">
          <g id="scale-web"></g>
        </g>
        <g id="cyclops-eye">
          <circle r="39" class="eye-white"/>
          <ellipse cx="0" cy="0" rx="14" ry="33" class="eye-iris"/>
          <ellipse cx="0" cy="-8" rx="4" ry="7" class="eye-glint"/>
        </g>
      </svg>

      <div class="control-strip" aria-label="Wheel controls">
        <button id="spin-toggle" data-action="spin" type="button" aria-pressed="false">Spin</button>
        <button data-action="step-back" type="button" aria-label="Step back one semitone" title="Step back">◀</button>
        <button data-action="reset" type="button" aria-label="Reset to A" title="Reset">A</button>
        <button data-action="step-fwd" type="button" aria-label="Step forward one semitone" title="Step forward">▶</button>
        <label class="range-control">
          <span>Speed</span>
          <input id="spin-speed" type="range" min="0" max="72" step="1" value="24" aria-label="Spin speed">
        </label>
        <label class="range-control">
          <span>Orbit</span>
          <input id="orbit-offset" type="range" min="-180" max="180" step="1" value="0" aria-label="Function orbit">
        </label>
        <label class="select-control">
          <span>Scale</span>
          <select id="scale-select" aria-label="Active scale"></select>
        </label>
        <div class="palette-toggle" aria-label="Palette">
          <button data-palette="carta" type="button" class="active">Carta</button>
          <button data-palette="mono" type="button">Mono</button>
        </div>
      </div>
    </section>

    <aside class="readout" aria-label="Current bindings">
      <div class="readout-head">
        <h2>Current Bindings</h2>
        <p id="scale-readout">A Eólico</p>
      </div>
      <table id="bindings">
        <thead><tr><th>Role</th><th>Glyph</th><th>Note</th><th>Orbit</th></tr></thead>
        <tbody></tbody>
      </table>
    </aside>
  </main>

  <section class="instruments" aria-label="Instrument flows">
    <div class="instrument-head">
      <h2>Piano Flow</h2>
      <p id="piano-readout">A Eólico</p>
    </div>
    <svg id="piano" viewBox="0 0 640 180" aria-label="Piano scale flow"></svg>

    <div class="instrument-head">
      <h2>Fretboard Flow</h2>
      <p id="fret-readout">EADGBE · 12 frets</p>
    </div>
    <svg id="fretboard" viewBox="0 0 776 238" aria-label="Guitar fretboard scale flow"></svg>
  </section>

  <footer>
    <p>Glyph, color, scale, piano, and fretboard states are driven by <code>fractalmusic.wheel.ROLES</code>.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
